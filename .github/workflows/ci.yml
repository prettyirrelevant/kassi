name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: setup go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: setup go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: build
        run: CGO_ENABLED=0 go build -o kassi ./cmd/kassi

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: setup go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: run tests
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: coverage summary
        run: go tool cover -func=coverage.out

  codeql:
    name: codeql
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: setup go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: initialize codeql
        uses: github/codeql-action/init@v3
        with:
          languages: go

      - name: build
        run: CGO_ENABLED=0 go build -o kassi ./cmd/kassi

      - name: analyze
        uses: github/codeql-action/analyze@v3
